name: comet-graph
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: kiaquila/comet-contribution-graph@v1
        with:
          username: jigarkhwar
